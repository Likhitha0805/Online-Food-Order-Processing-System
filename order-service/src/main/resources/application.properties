# Server configuration
server.port=${PORT:8081}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:likhitha@0805}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Auto-create tables from schema.sql on every startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ActiveMQ configuration — app starts even without a running broker
spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.pool.enabled=false
spring.jms.listener.auto-startup=false

# CORS — extra origins via env var (comma-separated)
allowed.origins=${ALLOWED_ORIGINS:}
